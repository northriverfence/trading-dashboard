apiVersion: v1
kind: Secret
metadata:
  name: stock-agent-secrets
  namespace: stock-agent
type: Opaque
stringData:
  # Alpaca API Credentials (replace with actual values)
  ALPACA_API_KEY: "YOUR_ALPACA_API_KEY"
  ALPACA_SECRET_KEY: "YOUR_ALPACA_SECRET_KEY"

  # Database Credentials (replace with actual values)
  DATABASE_USER: "stockagent"
  DATABASE_PASSWORD: "YOUR_DATABASE_PASSWORD"
