apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-agent
  namespace: stock-agent
  labels:
    app: stock-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-agent
  template:
    metadata:
      labels:
        app: stock-agent
    spec:
      containers:
        - name: stock-agent
          image: stock-agent:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: ALPACA_API_KEY
            - name: ALPACA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: ALPACA_SECRET_KEY
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: DATABASE_PASSWORD
          envFrom:
            - configMapRef:
                name: stock-agent-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
